services:
  ming-bir-hazina:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ming-bir-hazina
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      PORT: 3000
      ACCOUNTING_DB_FILE: /data/accounting-state.sqlite
      ACCOUNTING_STATE_FILE: /data/accounting-state.json
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      REMINDER_TIMEZONE: ${REMINDER_TIMEZONE:-Asia/Tashkent}
    volumes:
      - ming_bir_hazina_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  ming_bir_hazina_data:
